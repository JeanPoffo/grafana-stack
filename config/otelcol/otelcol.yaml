# ─────────────────────────────────────────────────────────────
# OpenTelemetry Collector — gateway para Spring Boot
# ─────────────────────────────────────────────────────────────
#
# Sua aplicação Spring aponta para:
#   OTLP gRPC  → localhost:4317
#   OTLP HTTP  → localhost:4318
#
# O Collector recebe tudo e distribui:
#   Traces  → Grafana Tempo
#   Métricas → Grafana Mimir (via Prometheus remote_write)
#   Logs    → stdout (extensível para Loki futuramente)
# ─────────────────────────────────────────────────────────────

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  # ── OTLP — protocolo nativo do Spring Boot Actuator / Micrometer ──
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

  # ── Prometheus scrape — para apps que expõem /actuator/prometheus ──
  prometheus:
    config:
      scrape_configs:
        - job_name: spring-app
          scrape_interval: 15s
          static_configs:
            # Adicione os hosts/portas das suas instâncias Spring aqui
            - targets: []
              # Exemplo:
              # - targets: ["host.docker.internal:8080"]
              #   labels:
              #     service: meu-servico

  # ── Host metrics do próprio collector (opcional) ──
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      load:
      network:

processors:
  # ── Batching: agrupa dados antes de exportar (reduz conexões) ──
  batch:
    send_batch_size: 1000
    send_batch_max_size: 2000
    timeout: 5s

  # ── Memory limiter: evita OOM no collector ──
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 20

  # ── Enriquece recursos com atributos padrão ──
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert
      - key: collector.version
        value: "1.0"
        action: insert

  # ── Filtra spans de health-check para não poluir os traces ──
  filter/drop_health:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.target"] == "/actuator/health"'
        - 'attributes["http.target"] == "/actuator/prometheus"'
        - 'attributes["url.path"] == "/actuator/health"'
        - 'attributes["url.path"] == "/actuator/prometheus"'

  # ── Adiciona atributos de resource a partir do environment ──
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

exporters:
  # ── Traces → Grafana Tempo (OTLP gRPC interno) ──
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # ── Métricas → Grafana Mimir (Prometheus remote_write) ──
  prometheusremotewrite/mimir:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure_skip_verify: true
    resource_to_telemetry_conversion:
      enabled: true
    add_metric_suffixes: false
    target_info:
      enabled: true

  # ── Debug local (descomente para troubleshooting) ──
  # debug:
  #   verbosity: detailed

  # ── Logs → stdout ──
  debug/logs:
    verbosity: basic

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    # Traces: recebe → filtra health-checks → envia ao Tempo
    traces:
      receivers: [otlp]
      processors: [memory_limiter, filter/drop_health, resource, resourcedetection, batch]
      exporters: [otlp/tempo]

    # Métricas OTLP: recebe do Spring → envia ao Mimir
    metrics/otlp:
      receivers: [otlp]
      processors: [memory_limiter, resource, resourcedetection, batch]
      exporters: [prometheusremotewrite/mimir]

    # Métricas Prometheus scrape: raspa /actuator/prometheus → Mimir
    metrics/scrape:
      receivers: [prometheus, hostmetrics]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite/mimir]

    # Logs via OTLP (ex: Logback com otel appender)
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug/logs]

  telemetry:
    logs:
      level: warn
    metrics:
      level: basic
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888